<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Study the Bible with summaries by Mateo the Preacher. Multiple versions, offline access.">
  <meta name="theme-color" content="#1c2b3a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bible Summaries by Mateo</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <style>
    :root {
      --bg-primary:#f8f6f1; --bg-secondary:#f0ede6;
      --bg-scripture:#fff;
      --text-primary:#1a1a1a; --text-secondary:#444;
      --border-color:#ddd; --verse-hover:#fffacd;
      --accent:#1c2b3a; --gold:#c9a84c;
      --accent-light:#2a3f54;
    }
    body.dark-mode {
      --bg-primary:#1a1a1a; --bg-secondary:#222;
      --bg-scripture:#111;
      --text-primary:#e0e0e0; --text-secondary:#b0b0b0;
      --border-color:#333; --verse-hover:#2a2a1a;
      --accent:#0d1a26; --accent-light:#1c2b3a;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    body{font-family:'Lora',Georgia,serif;height:100vh;display:flex;flex-direction:column;background:var(--bg-primary);color:var(--text-primary);transition:background .3s,color .3s;overflow:hidden;}

    /* ── Top bar ──────────────────────────────────────────────── */
    .topbar{
      background:var(--accent);color:#fff;
      padding:10px 16px;
      border-bottom:3px solid var(--gold);
      display:flex;align-items:center;
      justify-content:space-between;
      flex-shrink:0;gap:10px;
    }

    /* Menu button */
    .menu-btn{
      background:var(--gold);color:var(--accent);
      border:none;padding:8px 14px;
      cursor:pointer;border-radius:6px;
      font-size:13px;font-weight:bold;
      white-space:nowrap;transition:opacity .2s;
    }
    .menu-btn:hover{opacity:.85;}

    /* Chalkboard title */
    .chalkboard{
      flex:1;margin:0 10px;padding:8px 16px;
      background:radial-gradient(circle at top left,#2a2a2a,#111);
      border:1px solid #444;border-radius:8px;
      text-align:center;
      font-family:'Permanent Marker',cursive;color:#fff;
    }
    .chalkboard h1{font-size:clamp(10px,1.6vw,20px);font-weight:normal;margin-bottom:2px;}
    .chalkboard p{font-size:clamp(8px,1vw,12px);font-style:italic;color:#ccc;}

    /* View toggle */
    .view-toggle{
      display:flex;gap:4px;
      background:#0d1a26;
      border-radius:8px;padding:4px;
      flex-shrink:0;
    }
    .view-toggle button{
      background:transparent;color:#aaa;
      border:none;padding:6px 12px;
      border-radius:6px;cursor:pointer;
      font-size:12px;font-weight:bold;
      transition:all .2s;white-space:nowrap;
    }
    .view-toggle button.active{
      background:var(--gold);color:var(--accent);
    }

    /* Dark mode + icon */
    .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .icon-btn{background:transparent;border:none;cursor:pointer;font-size:20px;padding:4px;}

    /* ── Dropdown ─────────────────────────────────────────────── */
    .menu-wrapper{position:relative;}
    .dropdown{
      display:none;position:absolute;
      top:calc(100% + 6px);left:0;
      background:#fff;color:#000;
      border:1px solid #ccc;
      min-width:250px;max-height:450px;
      overflow-y:auto;z-index:9999;
      border-radius:8px;
      box-shadow:0 8px 24px rgba(0,0,0,.2);
    }
    .dropdown.open{display:block;}
    body.dark-mode .dropdown{background:#1e1e1e;color:#e0e0e0;border-color:#444;}

    .dropdown-search{padding:10px;border-bottom:1px solid #eee;}
    .dropdown-search input{
      width:100%;padding:8px 12px;
      border:1px solid #ddd;border-radius:6px;
      font-size:13px;font-family:Arial,sans-serif;
    }
    body.dark-mode .dropdown-search input{background:#2a2a2a;color:#e0e0e0;border-color:#444;}

    .testament-tabs{display:flex;list-style:none;border-bottom:1px solid #eee;}
    .testament-tabs li{
      flex:1;padding:10px;text-align:center;
      cursor:pointer;font-weight:bold;font-size:13px;
      font-family:Arial,sans-serif;
      background:#f4f4f4;transition:background .2s;
    }
    .testament-tabs li:hover{background:#e0e0e0;}
    .testament-tabs li.active{background:var(--gold);color:#fff;}
    body.dark-mode .testament-tabs li{background:#2a2a2a;}
    body.dark-mode .testament-tabs li.active{background:var(--gold);color:#1c2b3a;}

    #booksList{padding:4px 0;}
    #booksList ul{list-style:none;}
    #booksList > ul > li{
      padding:9px 16px;cursor:pointer;
      font-size:14px;font-family:Arial,sans-serif;
      transition:background .15s;
    }
    #booksList > ul > li:hover{background:#f0ede6;}
    #booksList > ul > li.active-book{font-weight:bold;color:var(--gold);}
    body.dark-mode #booksList > ul > li:hover{background:#2a2a2a;}

    .chapter-list{list-style:none;background:#faf8f4;border-top:1px solid #eee;}
    body.dark-mode .chapter-list{background:#161616;border-color:#333;}
    .chapter-list li{
      padding:7px 16px 7px 32px;
      cursor:pointer;font-size:13px;
      font-family:Arial,sans-serif;color:#666;
      transition:background .15s;
    }
    .chapter-list li:hover{background:#e8e4dc;color:#000;}
    .chapter-list li.selected{background:var(--gold);color:#fff;font-weight:bold;}
    body.dark-mode .chapter-list li{color:#888;}
    body.dark-mode .chapter-list li:hover{background:#2a2a2a;color:#fff;}

    /* ── Content area ─────────────────────────────────────────── */
    .content{flex:1;display:flex;overflow:hidden;min-height:0;}

    /* Summary panel */
    .left{
      width:100%;padding:24px 28px;
      background:var(--bg-primary);
      overflow-y:auto;
      transition:width .4s cubic-bezier(.4,0,.2,1),
                 padding .4s, opacity .3s;
    }
    .left.split{width:50%;border-right:1px solid var(--border-color);}
    .left.hidden{width:0;padding:0;overflow:hidden;opacity:0;}

    /* Scripture panel */
    .right{
      width:0;padding:0;
      background:var(--bg-scripture);
      overflow-y:auto;opacity:0;
      transition:width .4s cubic-bezier(.4,0,.2,1),
                 padding .4s, opacity .3s;
    }
    .right.split{width:50%;padding:24px 28px;opacity:1;}
    .right.full{width:100%;padding:24px 28px;opacity:1;}

    /* ── Controls row ─────────────────────────────────────────── */
    .controls{
      margin-bottom:18px;
      display:flex;align-items:center;
      gap:10px;flex-wrap:wrap;
    }
    .controls label{font-size:13px;color:var(--text-secondary);font-family:Arial,sans-serif;}
    select{
      padding:7px 10px;
      border:1px solid var(--border-color);
      border-radius:6px;
      background:var(--bg-scripture);
      color:var(--text-primary);
      font-size:13px;font-family:Arial,sans-serif;
    }

    /* Nav buttons */
    .nav-buttons{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .nav-btn{
      background:var(--accent);color:#fff;
      border:none;padding:8px 16px;
      cursor:pointer;border-radius:6px;
      font-size:13px;font-family:Arial,sans-serif;
      transition:background .2s;
    }
    .nav-btn:hover{background:var(--accent-light);}
    .nav-btn:disabled{background:#ccc;cursor:not-allowed;}

    /* ── Summary content ──────────────────────────────────────── */
    #summaryContent{margin-top:8px;line-height:1.8;}
    #summaryContent h1{font-size:1.5rem;color:var(--gold);margin-bottom:10px;}
    #summaryContent h2{
      font-size:1.2rem;color:var(--text-primary);
      border-bottom:2px solid var(--gold);
      padding-bottom:5px;margin:6px 0 8px;
    }
    #summaryContent h3{
      font-size:.68rem;text-transform:uppercase;
      letter-spacing:.1em;color:var(--gold);
      margin:20px 0 6px;font-family:Arial,sans-serif;
    }
    #summaryContent p{line-height:1.85;margin:6px 0 12px;color:var(--text-secondary);font-size:15px;}
    #summaryContent strong{color:var(--text-primary);}
    #summaryContent blockquote{
      border-left:3px solid var(--gold);
      background:#fdf8ee;margin:14px 0;
      padding:12px 18px;border-radius:0 6px 6px 0;
      font-style:italic;color:var(--text-secondary);
    }
    body.dark-mode #summaryContent blockquote{background:#1a1a0a;}
    #summaryContent blockquote.prayer-block{border-left-color:#2563eb;background:#eef3ff;}
    body.dark-mode #summaryContent blockquote.prayer-block{background:#0d1428;}
    #summaryContent hr{border:none;border-top:1px solid var(--border-color);margin:22px 0;}
    #summaryContent ul{margin:4px 0 14px 22px;color:var(--text-secondary);}
    #summaryContent li{margin-bottom:7px;line-height:1.85;font-size:15px;}

    /* ── Verses ───────────────────────────────────────────────── */
    .chapter-content{margin-top:8px;}
    .verse{
      padding:9px 9px 9px 48px;margin:3px 0;
      border-left:3px solid transparent;
      position:relative;cursor:pointer;
      transition:background .15s,border-color .15s;
      line-height:1.85;font-size:15px;
      color:var(--text-secondary);
    }
    .verse:hover{background:var(--verse-hover);border-left-color:var(--gold);}
    .verse-number{
      position:absolute;left:10px;top:10px;
      font-weight:bold;color:var(--gold);
      font-size:.82em;min-width:28px;
      font-family:Arial,sans-serif;
    }

    /* ── Section headings ─────────────────────────────────────── */
    .panel-heading{
      font-size:1.15rem;font-weight:bold;
      color:var(--text-primary);
      border-bottom:2px solid var(--gold);
      padding-bottom:6px;margin-bottom:16px;
    }

    /* ── Comments/Questions ───────────────────────────────────── */
    .section{margin-top:30px;padding-top:16px;border-top:1px solid var(--border-color);}
    .section h3{margin-bottom:10px;font-size:15px;font-family:Arial,sans-serif;}
    .section textarea{
      width:100%;height:60px;margin-bottom:8px;
      padding:8px;border:1px solid var(--border-color);
      border-radius:6px;background:var(--bg-scripture);
      color:var(--text-primary);resize:vertical;
      font-family:'Lora',Georgia,serif;font-size:14px;
    }
    .section button{
      background:var(--gold);color:var(--accent);
      border:none;padding:7px 14px;
      cursor:pointer;border-radius:6px;
      font-weight:bold;font-family:Arial,sans-serif;
    }
    .list{margin-top:10px;}
    .list p{
      background:var(--bg-secondary);
      padding:8px 12px;border-radius:6px;
      margin-bottom:6px;font-size:14px;
    }

    /* ── Offline ──────────────────────────────────────────────── */
    .offline-indicator{
      position:fixed;bottom:20px;right:20px;
      background:#ff9800;color:#fff;
      padding:10px 18px;border-radius:6px;
      display:none;z-index:9999;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
      font-family:Arial,sans-serif;font-size:13px;
    }
    .offline-indicator.show{display:block;}

    /* Overlay */
    #menuOverlay{display:none;position:fixed;inset:0;z-index:9998;}
    #menuOverlay.active{display:block;}
  </style>
</head>
<body>

<div id="menuOverlay" onclick="closeMenu()"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="menu-wrapper">
    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>
    <div class="dropdown" id="dropdownMenu">
      <div class="dropdown-search">
        <input type="text" id="searchInput" placeholder="Search books…" autocomplete="off">
      </div>
      <ul class="testament-tabs">
        <li id="tabOld" class="active" onclick="showBooks('old')">Old Testament</li>
        <li id="tabNew" onclick="showBooks('new')">New Testament</li>
      </ul>
      <div id="booksList"></div>
    </div>
  </div>

  <div class="chalkboard">
    <h1>BIBLE SUMMARIES BY MATEO THE PREACHER</h1>
    <p>"Study to shew thyself approved unto God…" — 2 Timothy 2:15</p>
  </div>

  <!-- 3-way view toggle -->
  <div class="view-toggle">
    <button id="btnSummary"   onclick="setView('summary')"   class="active">📝 Summary</button>
    <button id="btnSplit"     onclick="setView('split')">⚡ Split</button>
    <button id="btnScripture" onclick="setView('scripture')">📖 Scripture</button>
  </div>

  <div class="topbar-right">
    <button class="icon-btn" onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>
    <div style="width:44px;height:58px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:24px;">📖</div>
  </div>
</div>

<!-- Main content -->
<div class="content">

  <!-- Left: Summary -->
  <div class="left" id="leftPanel">
    <div class="panel-heading">Scripture Summary</div>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevBtn" onclick="navigateChapter(-1)" disabled>← Previous</button>
      <button class="nav-btn" id="nextBtn" onclick="navigateChapter(1)"  disabled>Next →</button>
    </div>
    <div class="controls">
      <label>Version:</label>
      <select id="versionSelect" onchange="onVersionChange()">
        <option value="asv">ASV</option>
        <option value="kjv" selected>KJV</option>
        <option value="web">WEB</option>
      </select>
    </div>
    <p id="summaryText" style="color:var(--text-secondary);font-style:italic;font-size:15px;">
      Open the Menu → choose a book → select a chapter.
    </p>
    <div id="summaryContent" style="display:none;"></div>
    <div class="section">
      <h3>💬 Comments</h3>
      <textarea id="commentInput" placeholder="Leave a comment…"></textarea>
      <button onclick="addComment()">Post Comment</button>
      <div class="list" id="commentsList"></div>
    </div>
  </div>

  <!-- Right: Scripture -->
  <div class="right" id="rightPanel">
    <div class="panel-heading" id="chapterHeading">Chapter Text</div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="navigateChapter(-1)">← Previous</button>
      <button class="nav-btn" onclick="navigateChapter(1)">Next →</button>
    </div>
    <div class="chapter-content" id="chapterContent"></div>
    <div class="section">
      <h3>❓ Questions</h3>
      <textarea id="questionInput" placeholder="Ask a question…"></textarea>
      <button onclick="addQuestion()">Post Question</button>
      <div class="list" id="questionsList"></div>
    </div>
  </div>
</div>

<div class="offline-indicator" id="offlineIndicator">📡 You're offline — cached content only</div>

<script>
  // ── Config ────────────────────────────────────────────────────
  const S3_BASE_URL = "https://edwin-aws.github.io/files";

  // ── Service Worker ────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(r => console.log('SW:', r.scope))
        .catch(e => console.warn('SW failed:', e));
    });
  }

  // ── Offline ───────────────────────────────────────────────────
  const offlineEl = document.getElementById('offlineIndicator');
  window.addEventListener('online',  () => offlineEl.classList.remove('show'));
  window.addEventListener('offline', () => offlineEl.classList.add('show'));
  if (!navigator.onLine) offlineEl.classList.add('show');

  // ── State ─────────────────────────────────────────────────────
  let currentBook = '', currentChapterNum = 0, currentChapter = '', currentTestament = 'old';
  let currentView = 'summary'; // 'summary' | 'split' | 'scripture'

  // ── Bible structure ───────────────────────────────────────────
  const bibleStructure = {
    old:{
      "Genesis":50,"Exodus":40,"Leviticus":27,"Numbers":36,"Deuteronomy":34,
      "Joshua":24,"Judges":21,"Ruth":4,"1 Samuel":31,"2 Samuel":24,
      "1 Kings":22,"2 Kings":25,"1 Chronicles":29,"2 Chronicles":36,
      "Ezra":10,"Nehemiah":13,"Esther":10,"Job":42,"Psalms":150,
      "Proverbs":31,"Ecclesiastes":12,"Song of Solomon":8,"Isaiah":66,
      "Jeremiah":52,"Lamentations":5,"Ezekiel":48,"Daniel":12,
      "Hosea":14,"Joel":3,"Amos":9,"Obadiah":1,"Jonah":4,
      "Micah":7,"Nahum":3,"Habakkuk":3,"Zephaniah":3,"Haggai":2,"Zechariah":14,"Malachi":4
    },
    new:{
      "Matthew":28,"Mark":16,"Luke":24,"John":21,"Acts":28,
      "Romans":16,"1 Corinthians":16,"2 Corinthians":13,"Galatians":6,
      "Ephesians":6,"Philippians":4,"Colossians":4,"1 Thessalonians":5,
      "2 Thessalonians":3,"1 Timothy":6,"2 Timothy":4,"Titus":3,
      "Philemon":1,"Hebrews":13,"James":5,"1 Peter":5,"2 Peter":3,
      "1 John":5,"2 John":1,"3 John":1,"Jude":1,"Revelation":22
    }
  };
  const singleChapterBooks = {"Obadiah":21,"Philemon":25,"2 John":13,"3 John":14,"Jude":25};

  const booksWithSummaries = {
    "Genesis":"Genesis","Exodus":"Exodus","Leviticus":"Leviticus",
    "Numbers":"Numbers","Deuteronomy":"Deuteronomy","Joshua":"Joshua",
    "Judges":"Judges","Ruth":"Ruth",
    "1 Samuel":"1Samuel","2 Samuel":"2Samuel","1 Kings":"1Kings"
  };

  // ── Utilities ─────────────────────────────────────────────────
  marked.setOptions({breaks:true, gfm:true});
  const esc   = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  // ── View toggle ───────────────────────────────────────────────
  function setView(view) {
    currentView = view;
    const left  = document.getElementById('leftPanel');
    const right = document.getElementById('rightPanel');

    // Reset classes
    left.className  = 'left';
    right.className = 'right';

    if (view === 'summary') {
      // Summary full width, scripture hidden
    } else if (view === 'split') {
      left.classList.add('split');
      right.classList.add('split');
      if (currentChapter) loadChapter();
    } else if (view === 'scripture') {
      left.classList.add('hidden');
      right.classList.add('full');
      if (currentChapter) loadChapter();
    }

    // Update button states
    ['summary','split','scripture'].forEach(v => {
      document.getElementById('btn' + v.charAt(0).toUpperCase() + v.slice(1))
        .classList.toggle('active', v === view);
    });
  }

  // ── Menu ──────────────────────────────────────────────────────
  function toggleMenu() {
    const menu    = document.getElementById('dropdownMenu');
    const overlay = document.getElementById('menuOverlay');
    const opening = !menu.classList.contains('open');
    menu.classList.toggle('open', opening);
    overlay.classList.toggle('active', opening);
  }
  function closeMenu() {
    document.getElementById('dropdownMenu').classList.remove('open');
    document.getElementById('menuOverlay').classList.remove('active');
  }
  function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

  // ── Testament tabs ────────────────────────────────────────────
  function showBooks(testament) {
    currentTestament = testament;
    document.getElementById('tabOld').classList.toggle('active', testament==='old');
    document.getElementById('tabNew').classList.toggle('active', testament==='new');
    document.querySelectorAll('.chapter-list').forEach(el => el.remove());

    const ul = document.createElement('ul');
    Object.keys(bibleStructure[testament]).forEach(book => {
      const li = document.createElement('li');
      li.textContent = book;
      li.dataset.book = book;
      if (book === currentBook) li.classList.add('active-book');
      li.addEventListener('click', e => { e.stopPropagation(); toggleChapterList(testament, book, li); });
      ul.appendChild(li);
    });
    const bl = document.getElementById('booksList');
    bl.innerHTML = '';
    bl.appendChild(ul);
  }

  // ── Chapter list ──────────────────────────────────────────────
  function toggleChapterList(testament, book, bookLi) {
    const next = bookLi.nextElementSibling;
    if (next && next.classList.contains('chapter-list')) {
      next.remove(); bookLi.classList.remove('active-book'); return;
    }
    document.querySelectorAll('.chapter-list').forEach(el => el.remove());
    document.querySelectorAll('#booksList li.active-book').forEach(el => el.classList.remove('active-book'));
    bookLi.classList.add('active-book');

    const count = bibleStructure[testament][book];
    const ul    = document.createElement('ul');
    ul.className = 'chapter-list';
    for (let i = 1; i <= count; i++) {
      const li    = document.createElement('li');
      li.textContent = `Chapter ${i}`;
      if (book === currentBook && i === currentChapterNum) li.classList.add('selected');
      const chNum = i;
      li.addEventListener('click', e => {
        e.stopPropagation();
        ul.querySelectorAll('li').forEach(x => x.classList.remove('selected'));
        li.classList.add('selected');
        selectChapter(book, chNum);
      });
      ul.appendChild(li);
    }
    bookLi.insertAdjacentElement('afterend', ul);
  }

  // ── Select chapter ────────────────────────────────────────────
  function selectChapter(book, chNum) {
    currentBook = book; currentChapterNum = chNum;
    currentChapter = `${book} ${chNum}`;
    currentTestament = bibleStructure.old[book] ? 'old' : 'new';
    const maxCh = bibleStructure[currentTestament][book];
    document.getElementById('prevBtn').disabled = chNum <= 1;
    document.getElementById('nextBtn').disabled = chNum >= maxCh;
    closeMenu();
    loadSummary(book, chNum);
    if (currentView === 'split' || currentView === 'scripture') loadChapter();
  }

  // ── Summary loader ────────────────────────────────────────────
  const summaryCache = {};
  async function loadSummary(book, chNum) {
    const msgEl  = document.getElementById('summaryText');
    const contEl = document.getElementById('summaryContent');
    const mdKey  = booksWithSummaries[book];
    if (!mdKey) {
      contEl.style.display='none'; msgEl.style.display='block';
      msgEl.innerText=`Summaries for ${book} are coming soon!`; return;
    }
    msgEl.style.display='block'; msgEl.innerText='Loading summary…';
    contEl.style.display='none';
    try {
      if (!summaryCache[mdKey]) {
        const url = `${S3_BASE_URL}/summaries/${mdKey}.md`;
        const r   = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status} — ${url}`);
        summaryCache[mdKey] = await r.text();
      }
      const html = extractChapterHtml(summaryCache[mdKey], book, chNum);
      msgEl.style.display='none'; contEl.style.display='block';
      contEl.innerHTML=html; contEl.scrollTop=0;
      document.getElementById('leftPanel').scrollTop=0;
      contEl.querySelectorAll('blockquote').forEach(bq => {
        if (bq.textContent.includes('🙏')) bq.classList.add('prayer-block');
      });
    } catch(err) {
      msgEl.style.display='block';
      msgEl.innerText=`Could not load summary for ${book} ${chNum}.\n${err.message}`;
      contEl.style.display='none';
    }
  }

  // ── Extract chapter from MD ───────────────────────────────────
  function extractChapterHtml(fullMd, book, chNum) {
    const lines = fullMd.split('\n');
    const re    = new RegExp(`^##\\s+${escRe(book)}\\s+${chNum}(?:\\s|$|\\s*[—\\-])`, 'i');

    let start = -1;
    for (let i = 0; i < lines.length; i++) {
      if (re.test(lines[i])) { start = i; break; }
    }
    if (start === -1) {
      return `<p style="color:#888;font-style:italic">
        The summary for ${esc(book)} ${chNum} hasn't been written yet. Check back soon!
      </p>`;
    }

    const chLines = [lines[start]];
    for (let i = start + 1; i < lines.length; i++) {
      if (/^##\s/.test(lines[i]) && !/^###/.test(lines[i])) break;
      chLines.push(lines[i]);
    }

    // Introduction (chapter 1 only)
    const introLines = [];
    let inIntro = false;
    for (let i = 0; i < lines.length; i++) {
      if (/^## Introduction/i.test(lines[i])) { inIntro = true; }
      if (inIntro) {
        if (/^## /i.test(lines[i]) && !/^## Introduction/i.test(lines[i])) break;
        introLines.push(lines[i]);
      }
    }

    // Final Summary
    const finalLines = [];
    let inFinal = false;
    for (let i = 0; i < lines.length; i++) {
      if (/^## Final Summary/i.test(lines[i])) { inFinal = true; }
      if (inFinal) {
        if (/^## /i.test(lines[i]) && !/^## Final Summary/i.test(lines[i])) break;
        finalLines.push(lines[i]);
      }
    }

    const parts = [];
    if (chNum === 1 && introLines.length) parts.push(introLines.join('\n'));
    parts.push(chLines.join('\n'));
    if (finalLines.length) parts.push(finalLines.join('\n'));

    return marked.parse(parts.join('\n\n---\n\n'));
  }

  // ── Bible text ────────────────────────────────────────────────
  async function loadChapter() {
    if (!currentBook) return;
    const content = document.getElementById('chapterContent');
    const version = document.getElementById('versionSelect').value;
    document.getElementById('chapterHeading').textContent =
      `${currentChapter} (${version.toUpperCase()})`;
    content.innerHTML = '<p style="color:#888;font-style:italic">Fetching verses…</p>';
    try {
      const url = singleChapterBooks[currentBook]
        ? `https://bible-api.com/${encodeURIComponent(currentBook)}%201:1-${singleChapterBooks[currentBook]}?translation=${version}`
        : `https://bible-api.com/${encodeURIComponent(currentChapter)}?translation=${version}`;
      const r    = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (data.verses && data.verses.length) {
        content.innerHTML = data.verses.map(v =>
          `<div class="verse">
            <span class="verse-number">${v.verse}</span>
            <span class="verse-text">${v.text}</span>
          </div>`
        ).join('');
      } else {
        content.innerText = `No verses found for ${currentChapter} in ${version.toUpperCase()}.`;
      }
    } catch(err) {
      content.innerHTML = `<p style="color:red"><strong>Could not load ${esc(currentChapter)}</strong><br>
        <small>${esc(err.message)}</small></p>`;
    }
  }

  function onVersionChange() {
    if ((currentView === 'split' || currentView === 'scripture') && currentChapter) loadChapter();
  }

  // ── Navigate prev/next ────────────────────────────────────────
  function navigateChapter(dir) {
    if (!currentBook) return;
    const maxCh = bibleStructure[currentTestament][currentBook];
    const next  = currentChapterNum + dir;
    if (next < 1 || next > maxCh) return;
    const chList = document.querySelector('.chapter-list');
    if (chList) {
      const t = chList.querySelectorAll('li')[next - 1];
      if (t) { t.click(); return; }
    }
    selectChapter(currentBook, next);
  }

  // ── Search ────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#booksList > ul > li').forEach(li => {
      li.style.display = li.dataset.book.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  // ── Comments / Questions ──────────────────────────────────────
  function addComment() {
    const inp = document.getElementById('commentInput');
    if (!inp.value.trim()) return;
    const p = document.createElement('p');
    p.textContent = inp.value.trim();
    document.getElementById('commentsList').appendChild(p);
    inp.value = '';
  }
  function addQuestion() {
    const inp = document.getElementById('questionInput');
    if (!inp.value.trim()) return;
    const p = document.createElement('p');
    p.textContent = inp.value.trim();
    document.getElementById('questionsList').appendChild(p);
    inp.value = '';
  }

  // ── Init ──────────────────────────────────────────────────────
  showBooks('old');
</script>
